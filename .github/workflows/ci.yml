name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholder values just to satisfy src/env.ts at build/test time.
      # Production values are configured in Vercel; these never reach prod.
      NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key-stub-anon-key
      NEXT_PUBLIC_SITE_URL: https://stub.example.com
      SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key-stub-service-role-key
      MAX_MEMBERS_PER_ORG: "5"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
