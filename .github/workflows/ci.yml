name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Stubs to satisfy src/env.ts during typecheck/build. Real production
      # values are configured in the deployment environment.
      DATABASE_URL: postgres://stub:stub@localhost:5432/stub
      BETTER_AUTH_SECRET: ci-stub-secret-at-least-32-characters-long
      NEXT_PUBLIC_SITE_URL: https://stub.example.com
      MAX_MEMBERS_PER_ORG: "5"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
